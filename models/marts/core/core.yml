version: 2

models:
  - name: dim_customer

    description: >
      Customer dimension containing one row per customer enriched with
      branch information and summarized customer-account relationship
      statistics.

    columns:
      - name: customer_id
        description: Unique identifier for the customer.
        tests:
          - unique
          - not_null

      - name: customer_name
        description: Full customer name.

      - name: customer_status
        description: Current status of the customer.
        tests:
          - not_null

      - name: branch_id
        description: Identifier of the customer's primary branch.
        tests:
          - relationships:
              arguments:
                to: ref('stg_branch')
                field: branch_id

      - name: total_account_count
        description: Total number of accounts associated with the customer.
        tests:
          - not_null

      - name: active_account_count
        description: Number of active accounts associated with the customer.
        tests:
          - not_null

      - name: customer_age
        description: Customer age in completed years when date of birth is available.

      - name: customer_tenure_days
        description: Number of days since the customer record was created.
        tests:
          - not_null

      - name: age_group
        description: Customer age-band classification.
        tests:
          - accepted_values:
              arguments:
                values:
                  - UNKNOWN
                  - MINOR
                  - 18-29
                  - 30-44
                  - 45-59
                  - 60+

      - name: active_customer_flag
        description: Indicates whether the customer status is active.
        tests:
          - accepted_values:
              arguments:
                values: [true, false]

      - name: multi_account_customer_flag
        description: Indicates whether the customer has more than one active account.
        tests:
          - accepted_values:
              arguments:
                values: [true, false]

  - name: dim_loan
    description: >
      Loan dimension containing one row per retail loan with customer,
      product, branch, balance, delinquency, and summarized payment attributes.

    columns:
      - name: loan_id
        description: Unique identifier for the loan.
        tests:
          - not_null
          - unique

      - name: loan_number
        description: Unique business loan number.
        tests:
          - not_null
          - unique

      - name: customer_id
        description: Identifier of the customer responsible for the loan.
        tests:
          - not_null

      - name: product_id
        description: Identifier of the loan product.
        tests:
          - not_null

      - name: branch_id
        description: Identifier of the branch responsible for the loan.
        tests:
          - not_null

      - name: loan_status
        description: Current lifecycle status of the loan.
        tests:
          - not_null

      - name: delinquency_bucket
        description: Delinquency classification based on days past due.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - CURRENT
                  - 1_29_DAYS
                  - 30_59_DAYS
                  - 60_89_DAYS
                  - 90_PLUS_DAYS
                  - UNKNOWN

      - name: active_loan_flag
        description: Indicates whether the loan is active.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: delinquent_flag
        description: Indicates whether the loan is past due.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

  - name: fct_loan_payment
    description: >
      Loan payment fact table containing one row per scheduled loan payment
      with payment amounts, allocations, timing metrics, and status flags.

    columns:
      - name: loan_payment_id
        description: Unique identifier for the loan payment record.
        tests:
          - not_null
          - unique

      - name: loan_id
        description: Identifier of the loan associated with the payment.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_loan')
                field: loan_id

      - name: scheduled_payment_date
        description: Date the payment was scheduled to be made.
        tests:
          - not_null

      - name: scheduled_amount
        description: Scheduled payment amount.

      - name: total_payment_amount
        description: Actual total payment amount.

      - name: payment_status
        description: Current status of the payment record.
        tests:
          - not_null

      - name: late_payment_flag
        description: Indicates whether payment occurred after its due date.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: overdue_payment_flag
        description: Indicates whether the payment is overdue and incomplete.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

  - name: dim_account
    description: >
      Account dimension containing one row per account. The model combines
      account attributes with product, branch, customer relationship, balance,
      and activity information for downstream reporting and analytics.

      Grain: One row per account_id.

    columns:
      - name: account_id
        description: Unique business identifier for the account.
        tests:
          - not_null
          - unique

      - name: account_number
        description: Business-facing account number assigned to the account.
        tests:
          - not_null

      - name: product_id
        description: Identifier of the product associated with the account.

      - name: product_code
        description: Business code used to identify the account product.

      - name: product_name
        description: Descriptive name of the account product.

      - name: product_category
        description: High-level category assigned to the account product.

      - name: product_type
        description: Detailed product classification for the account.

      - name: interest_bearing_flag
        description: True when the account product earns or accrues interest.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - true
                  - false

      - name: secured_flag
        description: True when the account product is secured by collateral.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - true
                  - false

      - name: product_active_flag
        description: True when the associated product is currently active.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - true
                  - false

      - name: branch_id
        description: Identifier of the branch associated with the account.
        tests:
          - relationships:
              arguments:
                to: ref('stg_branch')
                field: branch_id

      - name: branch_name
        description: Name of the branch associated with the account.

      - name: account_status
        description: Current operational status of the account.
        tests:
          - not_null

      - name: open_date
        description: Date the account was opened.
        tests:
          - not_null

      - name: close_date
        description: Date the account was closed, when applicable.

      - name: interest_rate
        description: Current annual interest rate associated with the account.

      - name: overdraft_limit
        description: Maximum approved overdraft amount for the account.

      - name: statement_cycle
        description: Statement processing cycle assigned to the account.

      - name: total_customer_count
        description: Total number of distinct customers related to the account.
        tests:
          - not_null

      - name: active_customer_count
        description: Number of active customers related to the account.
        tests:
          - not_null

      - name: active_ownership_percentage
        description: >
          Sum of ownership percentages associated with active customer
          relationships for the account.
        tests:
          - not_null

      - name: joint_account_flag
        description: True when more than one customer is actively related to the account.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - true
                  - false

      - name: account_age_days
        description: Number of days between the account open date and the relevant end date.
        tests:
          - not_null

      - name: account_age_months
        description: Number of months between the account open date and the relevant end date.
        tests:
          - not_null

      - name: open_account_flag
        description: True when the account is currently open.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - true
                  - false

      - name: negative_balance_flag
        description: True when the account's current balance is below zero.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - true
                  - false

      - name: overdraft_limit_exceeded_flag
        description: >
          True when the account's negative balance exceeds its approved
          overdraft limit.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - true
                  - false

      - name: last_activity_date
        description: Most recent transaction or account activity date.

      - name: days_since_last_activity
        description: Number of days since the account's most recent activity.

      - name: account_activity_status
        description: Activity classification derived from the most recent account activity.

      - name: account_created_ts
        description: Timestamp when the source account record was created.

      - name: account_updated_ts
        description: Timestamp when the source account record was most recently updated.

  - name: fct_account_transaction
    description: >
      Account transaction fact table containing one row per transaction.
      The model includes transaction timing, account and product references,
      transaction classifications, monetary measures, processing status,
      channel information, and analytical transaction flags.

      Grain: One row per transaction_id.

    columns:
      - name: transaction_id
        description: Unique business identifier for the transaction.
        tests:
          - not_null
          - unique

      - name: account_id
        description: Identifier of the account associated with the transaction.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_account')
                field: account_id

      - name: product_id
        description: Identifier of the product associated with the account at the time of the transaction.

      - name: account_branch_id
        description: Identifier of the branch associated with the account.

      - name: transaction_branch_id
        description: Identifier of the branch where the transaction was initiated or processed.

      - name: transaction_date
        description: Business date of the transaction.
        tests:
          - not_null

      - name: posted_ts
        description: Timestamp when the transaction was posted to the account.

      - name: transaction_month
        description: Calendar month derived from the transaction date.

      - name: transaction_quarter
        description: Calendar quarter derived from the transaction date.

      - name: transaction_year
        description: Calendar year derived from the transaction date.

      - name: transaction_month_number
        description: Numeric month of the year derived from the transaction date.

      - name: transaction_day_name
        description: Name of the weekday derived from the transaction date.

      - name: weekend_flag
        description: True when the transaction date falls on a Saturday or Sunday.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - true
                  - false

      - name: transaction_type
        description: Detailed business type assigned to the transaction.

      - name: transaction_category
        description: Higher-level analytical category assigned to the transaction.

      - name: transaction_channel
        description: Channel through which the transaction was initiated or processed.

      - name: debit_credit_indicator
        description: Indicates whether the transaction is classified as a debit or a credit.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - DEBIT
                  - CREDIT

      - name: transaction_status
        description: Current processing status of the transaction.
        tests:
          - not_null

      - name: amount
        description: Absolute monetary amount of the transaction.
        tests:
          - not_null

      - name: signed_amount
        description: >
          Transaction amount expressed with a sign, typically positive for
          credits and negative for debits.

      - name: credit_amount
        description: Transaction amount when the transaction is a credit; otherwise zero.

      - name: debit_amount
        description: Transaction amount when the transaction is a debit; otherwise zero.

      - name: credit_transaction_count
        description: Indicator measure equal to one for a credit transaction and zero otherwise.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - 0
                  - 1

      - name: debit_transaction_count
        description: Indicator measure equal to one for a debit transaction and zero otherwise.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - 0
                  - 1

      - name: transaction_description
        description: Description or memo associated with the transaction.

      - name: merchant_name
        description: Merchant or counterparty name associated with the transaction, when available.

      - name: reference_number
        description: External or source-system reference number associated with the transaction.

      - name: posted_flag
        description: True when the transaction has been posted to the account.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - true
                  - false

      - name: exception_transaction_flag
        description: True when the transaction meets defined exception criteria.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - true
                  - false

      - name: fee_transaction_flag
        description: True when the transaction represents a fee.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - true
                  - false

      - name: transaction_created_ts
        description: Timestamp when the source transaction record was created.